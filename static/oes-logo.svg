<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#39bdf8"/>
<stop offset="55%" stop-color="#2563eb"/>
<stop offset="100%" stop-color="#22c55e"/>
</linearGradient>

<radialGradient id="center" cx="50%" cy="35%">
<stop offset="0%" stop-color="#143d78"/>
<stop offset="100%" stop-color="#050b16"/>
</radialGradient>

<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="7" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

</defs>

<!-- Outer Glow -->
<circle
cx="110"
cy="110"
r="92"
fill="url(#center)"
stroke="url(#ring)"
stroke-width="8"
filter="url(#glow)"
/>

<!-- Inner Ring -->
<circle
cx="110"
cy="110"
r="72"
fill="none"
stroke="#3aaeff55"
stroke-width="2"
/>

<!-- Glass Reflection -->
<ellipse
cx="88"
cy="68"
rx="40"
ry="13"
fill="white"
opacity=".18"
transform="rotate(-24 88 68)"
/>

<!-- Execution Line -->
<path
d="M72 124
L95 124
L108 102
L122 116
L143 90
L156 96"
fill="none"
stroke="url(#ring)"
stroke-width="8"
stroke-linecap="round"
stroke-linejoin="round"
/>

<!-- Arrow -->
<path
d="M150 90
L166 90
L160 74"
fill="none"
stroke="#22c55e"
stroke-width="6"
stroke-linecap="round"
stroke-linejoin="round"
/>

<!-- OES -->
<text
x="110"
y="156"
text-anchor="middle"
font-family="Arial, Helvetica, sans-serif"
font-size="34"
font-weight="900"
letter-spacing="2"
fill="white">
OES
</text>

</svg>